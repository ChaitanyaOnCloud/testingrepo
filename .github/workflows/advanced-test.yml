name: Advanced AI Test

on: push

jobs:
  build-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node Env
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Verify Installation
        run: node --version

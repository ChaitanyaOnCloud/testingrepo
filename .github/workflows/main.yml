name: CI Pipeline
 
on:
  push
    branches: [main]   # ❌ Missing colon after 'push'
 
jobs:
  build:
    runs-on ubuntu-latest   # ❌ Missing colon
 
    steps:
      - name Checkout code   # ❌ Missing colon after 'name'
        uses: actions/checkout@v3
 
      - name: Setup Python
        uses actions/setup-python@v4   # ❌ Missing colon
 
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
 
      - name: Run tests
        run pytest   # ❌ Missing colon

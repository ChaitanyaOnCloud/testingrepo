name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          if [ -f backend/requirements.txt ]; then
            python -m pip install --upgrade pip
            pip install -r backend/requirements.txt
          else
            echo "No backend/requirements.txt found, skipping pip install."
          fi
      - name: Run tests
        run: |
          if [ -d backend ]; then
            cd backend
            pytest
          else
            echo "No backend directory found, skipping tests."
          fi

  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Install HTML tidy
        run: sudo apt-get update && sudo apt-get install -y tidy
      - name: Validate HTML
        run: |
          if [ -d frontend ]; then
            cd frontend
            tidy -e *.html || true
          else
            echo "No frontend directory found, skipping HTML validation."
          fi
      - name: Validate CSS
        run: |
          if [ -d frontend ]; then
            cd frontend
            if command -v stylelint >/dev/null 2>&1; then
              stylelint "**/*.css" || true
            else
              echo "stylelint not installed, skipping CSS validation."
            fi
          else
            echo "No frontend directory found, skipping CSS validation."
          fi
      - name: Validate JS
        run: |
          if [ -d frontend ]; then
            cd frontend
            if command -v eslint >/dev/null 2>&1; then
              eslint "**/*.js" || true
            else
              echo "eslint not installed, skipping JS validation."
            fi
          else
            echo "No frontend directory found, skipping JS validation."
          fi

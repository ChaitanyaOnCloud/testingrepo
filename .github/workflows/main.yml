name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  checkout:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

  backend:
    runs-on: ubuntu-latest
    needs: checkout
    steps:
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      - name: Run tests
        run: |
          cd backend
          pytest

  frontend:
    runs-on: ubuntu-latest
    needs: checkout
    steps:
      - name: Install HTML tidy
        run: sudo apt-get update && sudo apt-get install -y tidy
      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Install stylelint and eslint
        run: |
          npm install -g stylelint eslint
      - name: Validate HTML
        run: |
          cd frontend
          tidy -e *.html || true
      - name: Validate CSS
        run: |
          cd frontend
          stylelint "**/*.css" || true
      - name: Validate JS
        run: |
          cd frontend
          eslint "**/*.js" || true
